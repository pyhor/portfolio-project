<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Scroll Experience</title>
    <!-- Add some dummy text layers so there is content to scroll over -->
    <style>
      body {
        margin: 0;
        font-family: 'Inter', system-ui, sans-serif;
        color: white;
        background-color: transparent; /* VERY IMPORTANT: Let 3D canvas show through */
        overflow-x: hidden;
      }
      .section {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        padding: 0 10%;
      }
      .section:nth-child(odd) {
        align-items: flex-start;
      }
      .section:nth-child(even) {
        align-items: flex-end;
      }
      h1 {
        font-size: 5rem;
        margin: 0;
        text-transform: uppercase;
        letter-spacing: 5px;
        text-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
      }
      p {
        font-size: 1.5rem;
        max-width: 500px;
        opacity: 0.8;
      }

      /* CSS Typing Animation */
      .typewriter-text {
        overflow: hidden; /* Ensures the content is not revealed until the animation */
        border-right: .15em solid white; /* The typwriter cursor */
        white-space: nowrap; /* Keeps the content on a single line */
        margin: 0 auto; /* Gives that scrolling effect as the typing happens */
        letter-spacing: .1em; /* Adjust as needed */
        animation: 
          typing 3.5s steps(40, end),
          blink-caret .75s step-end infinite;
      }

      /* The typing effect */
      @keyframes typing {
        from { width: 0 }
        to { width: 100% }
      }

      /* The typewriter cursor effect */
      @keyframes blink-caret {
        from, to { border-color: transparent }
        50% { border-color: white; }
      }
    </style>
  </head>
  <body>
    <!-- The HTML content -->
    <section class="section">
      <h1>The Void.</h1>
      <!-- Added the typing class and width wrapping -->
      <div style="display: inline-block;">
        <p class="typewriter-text">Scroll down to explore the geometries of deep space.</p>
      </div>
    </section>

    <section class="section">
      <h1>Refraction.</h1>
      <p>A twenty-sided prism reflecting invisible light.</p>
    </section>

    <section class="section">
      <h1>Convergence.</h1>
      <p>The final destination at the end of the scroll.</p>
    </section>

    <!-- Vite main.js entry -->
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
